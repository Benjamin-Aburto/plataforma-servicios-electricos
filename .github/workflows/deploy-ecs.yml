name: CI/CD Servicios Electricos a AWS ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------- FRONTEND ----------
      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/frontend:${IMAGE_TAG} -t $ECR_REGISTRY/frontend:latest .
          docker push $ECR_REGISTRY/frontend --all-tags

      # ---------- CONTACT SERVICE ----------
      - name: Build & push CONTACT SERVICE
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd contact-service
          docker build -t $ECR_REGISTRY/contact-service:${IMAGE_TAG} -t $ECR_REGISTRY/contact-service:latest .
          docker push $ECR_REGISTRY/contact-service --all-tags

      # ---------- PORTFOLIO SERVICE ----------
      - name: Build & push PORTFOLIO SERVICE
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd portfolio-service
          docker build -t $ECR_REGISTRY/portfolio-service:${IMAGE_TAG} -t $ECR_REGISTRY/portfolio-service:latest .
          docker push $ECR_REGISTRY/portfolio-service --all-tags

      # ---------- NOTIFICATION SERVICE ----------
      - name: Build & push NOTIFICATION SERVICE
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd notification-service
          docker build -t $ECR_REGISTRY/notification-service:${IMAGE_TAG} -t $ECR_REGISTRY/notification-service:latest .
          docker push $ECR_REGISTRY/notification-service --all-tags

      # ---------- DATABASE ----------
      - name: Build & push DATABASE
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd database
          docker build -t $ECR_REGISTRY/database:${IMAGE_TAG} -t $ECR_REGISTRY/database:latest .
          docker push $ECR_REGISTRY/database --all-tags