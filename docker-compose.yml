name: electric-services-platform

services:

  # ---------------------------------------------------------
  # 1) Base de datos MySQL
  # ---------------------------------------------------------
  db:
    image: mysql:8.4
    container_name: electric-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Solo para depuración local (DBeaver/MySQL Workbench).
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------
  # 2) contact-service: recibe el formulario y lo guarda en MySQL
  # ---------------------------------------------------------
  contact-service:
    build:
      context: ./contact-service
      dockerfile: Dockerfile
    container_name: electric-contact-service
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Nombre del servicio de notificaciones, resuelto vía DNS interno de Docker
      NOTIFICATION_SERVICE_URL: http://notification-service:4002
    ports:
      - "${CONTACT_SERVICE_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------
  # 3) portfolio-service: expone la galería de trabajos realizados
  # ---------------------------------------------------------
  portfolio-service:
    build:
      context: ./portfolio-service
      dockerfile: Dockerfile
    container_name: electric-portfolio-service
    restart: unless-stopped
    environment:
      PORT: 4001
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${PORTFOLIO_SERVICE_PORT:-4001}:4001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------
  # 4) notification-service: simula el envío de un correo
  # ---------------------------------------------------------
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: electric-notification-service
    restart: unless-stopped
    environment:
      PORT: 4002
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-4002}:4002"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------
  # 5) frontend: landing page estática (Nginx)
  # ---------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electric-frontend
    restart: unless-stopped
    environment:
      CONTACT_API_URL: ${CONTACT_API_URL}
      PORTFOLIO_API_URL: ${PORTFOLIO_API_URL}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      contact-service:
        condition: service_healthy
      portfolio-service:
        condition: service_healthy
    networks:
      - app-network

networks:
  # Una sola red interna: los 5 servicios se resuelven entre sí
  # por nombre de servicio (DNS interno de Docker), p. ej.
  # http://contact-service:4000, http://db:3306, etc.
  app-network:
    driver: bridge

volumes:
  # Persiste los datos de MySQL entre "docker compose down/up"
  db-data:
