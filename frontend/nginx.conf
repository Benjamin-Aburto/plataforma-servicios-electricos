server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compresión para archivos de texto (HTML/CSS/JS)
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Cache agresivo para assets estáticos versionados por el navegador
  location ~* \.(css|js|jpg|jpeg|png|gif|svg|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # env-config.js se regenera en cada arranque del contenedor, nunca cachear
  location = /env-config.js {
    add_header Cache-Control "no-store";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cabeceras de seguridad básicas
  add_header X-Content-Type-Options "nosniff";
  add_header X-Frame-Options "SAMEORIGIN";
}
